<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTEROIDS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

const W = 900, H = 650;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = W;
canvas.height = H;

function resize() {
    const s = Math.min(window.innerWidth / W, window.innerHeight / H);
    canvas.style.width  = (W * s) + 'px';
    canvas.style.height = (H * s) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ── AUDIO ─────────────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function resumeAC() { if (AC.state === 'suspended') AC.resume(); }

function beep(freq, dur, type, vol) {
    resumeAC();
    try {
        const o = AC.createOscillator(), g = AC.createGain();
        o.connect(g); g.connect(AC.destination);
        o.type = type || 'square';
        o.frequency.value = freq;
        g.gain.setValueAtTime(vol || 0.12, AC.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
        o.start(); o.stop(AC.currentTime + dur);
    } catch (e) {}
}

function noiseBlast(dur, vol, cutoff) {
    resumeAC();
    try {
        const len = AC.sampleRate * dur | 0;
        const buf = AC.createBuffer(1, len, AC.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
        const src = AC.createBufferSource();
        const flt = AC.createBiquadFilter();
        const g   = AC.createGain();
        flt.type = 'bandpass';
        flt.frequency.value = cutoff || 180;
        flt.Q.value = 0.4;
        src.connect(flt); flt.connect(g); g.connect(AC.destination);
        src.buffer = buf;
        g.gain.setValueAtTime(vol, AC.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
        src.start(); src.stop(AC.currentTime + dur);
    } catch (e) {}
}

// ── UTILITY ───────────────────────────────────────────────────────────────────
const TAU  = Math.PI * 2;
const rnd  = (a, b) => a + Math.random() * (b - a);
const wrap = (v, m) => ((v % m) + m) % m;
const d2   = (ax, ay, bx, by) => (ax - bx) ** 2 + (ay - by) ** 2;

// ── INPUT ─────────────────────────────────────────────────────────────────────
const K = {};
window.addEventListener('keydown', e => {
    K[e.code] = true;
    if (['Space','ArrowUp','ArrowLeft','ArrowRight','ArrowDown'].includes(e.code))
        e.preventDefault();
});
window.addEventListener('keyup', e => { K[e.code] = false; });

// ── SHIP ──────────────────────────────────────────────────────────────────────
class Ship {
    constructor() {
        this.x = W / 2;  this.y = H / 2;
        this.vx = 0;     this.vy = 0;
        this.angle = -Math.PI / 2;
        this.radius = 12;
        this.thrusting = false;
    }
    update(dt) {
        if (K.ArrowLeft  || K.KeyA) this.angle -= 3.2 * dt;
        if (K.ArrowRight || K.KeyD) this.angle += 3.2 * dt;
        this.thrusting = !!(K.ArrowUp || K.KeyW);
        if (this.thrusting) {
            this.vx += Math.cos(this.angle) * 260 * dt;
            this.vy += Math.sin(this.angle) * 260 * dt;
        }
        const f = Math.pow(0.985, dt * 60);
        this.vx *= f; this.vy *= f;
        this.x = wrap(this.x + this.vx * dt, W);
        this.y = wrap(this.y + this.vy * dt, H);
    }
    draw(invTimer) {
        if (invTimer > 0 && Math.floor(invTimer * 8) % 2 === 0) return;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.8;
        ctx.beginPath();
        ctx.moveTo(18, 0);
        ctx.lineTo(-10, -8);
        ctx.lineTo(-5, 0);
        ctx.lineTo(-10, 8);
        ctx.closePath();
        ctx.stroke();
        if (this.thrusting && Math.random() > 0.35) {
            ctx.beginPath();
            ctx.moveTo(-6, -4);
            ctx.lineTo(-16 - Math.random() * 12, 0);
            ctx.lineTo(-6,  4);
            ctx.strokeStyle = '#f90';
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }
        ctx.restore();
    }
}

// ── ASTEROID ──────────────────────────────────────────────────────────────────
const A_RAD = [55, 28, 14];
const A_PTS = [20, 50, 100];
const A_SPD = [70, 120, 175];

class Asteroid {
    constructor(x, y, tier) {
        this.x = x; this.y = y; this.tier = tier;
        this.radius = A_RAD[tier];
        const spd = rnd(A_SPD[tier] * 0.5, A_SPD[tier]);
        const a = rnd(0, TAU);
        this.vx = Math.cos(a) * spd;
        this.vy = Math.sin(a) * spd;
        this.rot = rnd(-1.2, 1.2);
        this.angle = rnd(0, TAU);
        const n = [10, 8, 6][tier] + (Math.random() * 4 | 0);
        this.verts = Array.from({ length: n }, (_, i) => {
            const ang = (i / n) * TAU;
            const r   = this.radius * rnd(0.62, 1.0);
            return [Math.cos(ang) * r, Math.sin(ang) * r];
        });
    }
    update(dt) {
        this.x     = wrap(this.x + this.vx * dt, W);
        this.y     = wrap(this.y + this.vy * dt, H);
        this.angle += this.rot * dt;
    }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.8;
        ctx.beginPath();
        this.verts.forEach(([vx, vy], i) => i ? ctx.lineTo(vx, vy) : ctx.moveTo(vx, vy));
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
    }
}

// ── BULLET ────────────────────────────────────────────────────────────────────
class Bullet {
    constructor(ship) {
        this.x  = ship.x + Math.cos(ship.angle) * 20;
        this.y  = ship.y + Math.sin(ship.angle) * 20;
        this.vx = Math.cos(ship.angle) * 520 + ship.vx;
        this.vy = Math.sin(ship.angle) * 520 + ship.vy;
        this.life = 1.35;
    }
    update(dt) {
        this.x    = wrap(this.x + this.vx * dt, W);
        this.y    = wrap(this.y + this.vy * dt, H);
        this.life -= dt;
    }
    draw() {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(this.x, this.y, 2.5, 0, TAU);
        ctx.fill();
    }
}

// ── PARTICLE ──────────────────────────────────────────────────────────────────
class Particle {
    constructor(x, y) {
        const a = rnd(0, TAU), spd = rnd(40, 220);
        this.x  = x; this.y = y;
        this.vx = Math.cos(a) * spd;
        this.vy = Math.sin(a) * spd;
        this.life = this.max = rnd(0.3, 1.2);
    }
    update(dt) {
        this.x    += this.vx * dt;
        this.y    += this.vy * dt;
        this.vx   *= 0.97;
        this.vy   *= 0.97;
        this.life -= dt;
    }
    draw() {
        const alpha = (this.life / this.max).toFixed(2);
        ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x - this.vx * 0.06, this.y - this.vy * 0.06);
        ctx.stroke();
    }
}

// ── GAME STATE ────────────────────────────────────────────────────────────────
const ST = { TITLE: 0, PLAY: 1, DEAD: 2, OVER: 3 };
let st, score, hiScore, lives, level;
let ship, asteroids, bullets, particles;
let invTimer, shootTimer, deadTimer, goTimer, extraLifeAt;
let levelBanner, bgRocks;

hiScore   = parseInt(localStorage.getItem('ast_hi') || '0');
particles = [];
bgRocks   = [];

function initGame() {
    score        = 0;
    lives        = 3;
    level        = 1;
    extraLifeAt  = 10000;
    spawnLevel(true);
    st = ST.PLAY;
}

function spawnLevel(newShip) {
    asteroids   = [];
    bullets     = [];
    shootTimer  = 0;
    levelBanner = 2.5;
    if (!particles) particles = [];
    if (newShip) {
        ship     = new Ship();
        invTimer = 3;
    }
    const count = 3 + level;
    for (let i = 0; i < count; i++) {
        let x, y;
        do {
            x = rnd(0, W);
            y = rnd(0, H);
        } while (d2(x, y, W / 2, H / 2) < 190 ** 2);
        asteroids.push(new Asteroid(x, y, 0));
    }
}

function burst(x, y, n) {
    for (let i = 0; i < n; i++) particles.push(new Particle(x, y));
}

function miniShip(x, y) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(-Math.PI / 2);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.4;

    // Rumpf
    ctx.beginPath();
    ctx.moveTo(11, 0);
    ctx.lineTo(5, -4);
    ctx.lineTo(-5, -3);
    ctx.lineTo(-8, -2);
    ctx.lineTo(-8,  2);
    ctx.lineTo(-5,  3);
    ctx.lineTo( 5,  4);
    ctx.closePath();
    ctx.stroke();

    // Linker Flügel (zurückgepfeilt)
    ctx.beginPath();
    ctx.moveTo( 1, -4);
    ctx.lineTo(-3, -13);
    ctx.lineTo(-8, -11);
    ctx.lineTo(-5,  -3);
    ctx.closePath();
    ctx.stroke();

    // Rechter Flügel
    ctx.beginPath();
    ctx.moveTo( 1,  4);
    ctx.lineTo(-3, 13);
    ctx.lineTo(-8, 11);
    ctx.lineTo(-5,  3);
    ctx.closePath();
    ctx.stroke();

    // Cockpit
    ctx.beginPath();
    ctx.arc(5, 0, 2, 0, TAU);
    ctx.stroke();

    ctx.restore();
}

// ── TITLE ─────────────────────────────────────────────────────────────────────
function initTitle() {
    bgRocks = Array.from({ length: 8 }, () =>
        new Asteroid(rnd(0, W), rnd(0, H), Math.floor(rnd(0, 3)))
    );
}

function tickTitle(dt) {
    bgRocks.forEach(a => a.update(dt));
    if (K.Space || K.Enter) {
        K.Space = K.Enter = false;
        initGame();
    }
}

function drawTitle() {
    bgRocks.forEach(a => a.draw());
    ctx.textAlign = 'center';

    ctx.shadowColor = '#fff';
    ctx.shadowBlur  = 25;
    ctx.fillStyle   = '#fff';
    ctx.font        = 'bold 72px "Courier New", monospace';
    ctx.fillText('ASTEROIDS', W / 2, H / 2 - 80);
    ctx.shadowBlur  = 0;

    ctx.fillStyle = '#666';
    ctx.font      = '15px "Courier New", monospace';
    ctx.fillText('ATARI 1979  ·  BROWSER REMAKE', W / 2, H / 2 - 44);

    if (Math.floor(Date.now() / 500) % 2) {
        ctx.fillStyle = '#fff';
        ctx.font      = '22px "Courier New", monospace';
        ctx.fillText('DRÜCKE  SPACE  ZUM  STARTEN', W / 2, H / 2 + 26);
    }

    ctx.fillStyle = '#555';
    ctx.font      = '14px "Courier New", monospace';
    ctx.fillText('← → Drehen    ↑ Schub    SPACE Feuer', W / 2, H / 2 + 72);

    ctx.fillStyle = '#fff';
    ctx.font      = '18px "Courier New", monospace';
    ctx.fillText('BESTLEISTUNG:  ' + String(hiScore).padStart(6, '0'), W / 2, H / 2 + 115);
}

// ── GAMEPLAY ──────────────────────────────────────────────────────────────────
function tickPlay(dt) {
    levelBanner = Math.max(0, levelBanner - dt);

    if (st === ST.DEAD) {
        deadTimer -= dt;
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => p.update(dt));
        asteroids.forEach(a => a.update(dt));
        if (deadTimer <= 0) {
            if (lives <= 0) { st = ST.OVER; goTimer = 0; }
            else { ship = new Ship(); invTimer = 3; st = ST.PLAY; }
        }
        return;
    }

    invTimer   = Math.max(0, invTimer   - dt);
    shootTimer = Math.max(0, shootTimer - dt);

    ship.update(dt);

    if ((K.Space || K.ControlLeft || K.ControlRight) && shootTimer === 0) {
        bullets.push(new Bullet(ship));
        shootTimer = 0.15;
        beep(820, 0.1, 'square', 0.11);
    }

    bullets   = bullets.filter(b => b.life > 0);
    bullets.forEach(b => b.update(dt));
    asteroids.forEach(a => a.update(dt));
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => p.update(dt));

    // bullet × asteroid
    outer:
    for (let bi = bullets.length - 1; bi >= 0; bi--) {
        const b = bullets[bi];
        for (let ai = asteroids.length - 1; ai >= 0; ai--) {
            const a = asteroids[ai];
            if (d2(b.x, b.y, a.x, a.y) < a.radius ** 2) {
                bullets.splice(bi, 1);
                asteroids.splice(ai, 1);
                score += A_PTS[a.tier];
                if (score > hiScore) {
                    hiScore = score;
                    localStorage.setItem('ast_hi', hiScore);
                }
                if (score >= extraLifeAt) {
                    lives++;
                    extraLifeAt += 10000;
                    beep(1200, 0.35, 'sine', 0.2);
                }
                if (a.tier < 2) {
                    for (let s = 0; s < 2; s++)
                        asteroids.push(new Asteroid(a.x + rnd(-8, 8), a.y + rnd(-8, 8), a.tier + 1));
                }
                burst(a.x, a.y, a.tier === 0 ? 24 : a.tier === 1 ? 14 : 7);
                noiseBlast([0.5, 0.3, 0.15][a.tier], [0.18, 0.13, 0.09][a.tier], [100, 180, 350][a.tier]);
                continue outer;
            }
        }
    }

    // ship × asteroid
    if (invTimer === 0) {
        for (const a of asteroids) {
            if (d2(ship.x, ship.y, a.x, a.y) < (a.radius + 10) ** 2) {
                burst(ship.x, ship.y, 32);
                noiseBlast(0.9, 0.25, 120);
                lives--;
                st = ST.DEAD;
                deadTimer = 2.4;
                return;
            }
        }
    }

    if (asteroids.length === 0) {
        level++;
        spawnLevel(false);
        invTimer = 2;
        bullets  = [];
        beep(440, 0.1, 'sine', 0.1);
        beep(660, 0.1, 'sine', 0.1);
    }
}

function drawPlay() {
    particles.forEach(p => p.draw());
    asteroids.forEach(a => a.draw());
    bullets.forEach(b => b.draw());
    if (st === ST.PLAY) ship.draw(invTimer);

    // HUD
    ctx.textAlign = 'left';
    ctx.fillStyle = '#fff';
    ctx.font = '22px "Courier New", monospace';
    ctx.fillText(String(score).padStart(6, '0'), 18, 36);

    ctx.textAlign = 'right';
    ctx.fillStyle = '#555';
    ctx.font = '16px "Courier New", monospace';
    ctx.fillText('HI ' + String(hiScore).padStart(6, '0'), W - 18, 36);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#444';
    ctx.font = '15px "Courier New", monospace';
    ctx.fillText('LEVEL ' + level, W / 2, 36);

    for (let i = 0; i < lives; i++) miniShip(34 + i * 28, 64);

    if (levelBanner > 0) {
        const alpha = Math.min(levelBanner, 1).toFixed(2);
        ctx.textAlign = 'center';
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.font = '28px "Courier New", monospace';
        ctx.fillText('LEVEL ' + level, W / 2, H / 2);
    }

    if (st === ST.DEAD && lives > 0) {
        ctx.textAlign = 'center';
        ctx.fillStyle = '#f44';
        ctx.font = '30px "Courier New", monospace';
        ctx.fillText('SCHIFF ZERSTÖRT', W / 2, H / 2 + 40);
    }
}

// ── GAME OVER ─────────────────────────────────────────────────────────────────
function tickOver(dt) {
    goTimer += dt;
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => p.update(dt));
    if (goTimer > 2.0 && (K.Space || K.Enter)) {
        K.Space = K.Enter = false;
        st = ST.TITLE;
        initTitle();
    }
}

function drawOver() {
    particles.forEach(p => p.draw());

    ctx.textAlign   = 'center';
    ctx.shadowColor = '#f44';
    ctx.shadowBlur  = 22;
    ctx.fillStyle   = '#f44';
    ctx.font        = 'bold 60px "Courier New", monospace';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 55);
    ctx.shadowBlur  = 0;

    ctx.fillStyle = '#fff';
    ctx.font      = '26px "Courier New", monospace';
    ctx.fillText('PUNKTE:  ' + score, W / 2, H / 2 + 4);

    if (score > 0 && score >= hiScore) {
        ctx.fillStyle = '#ff0';
        ctx.font      = '19px "Courier New", monospace';
        ctx.fillText('✦  NEUER HIGHSCORE  ✦', W / 2, H / 2 + 46);
    }

    if (goTimer > 2 && Math.floor(goTimer * 2) % 2) {
        ctx.fillStyle = '#888';
        ctx.font      = '17px "Courier New", monospace';
        ctx.fillText('SPACE  ZUM  FORTFAHREN', W / 2, H / 2 + 102);
    }
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
st = ST.TITLE;
initTitle();

let last = 0;
function loop(ts) {
    const dt = Math.min((ts - last) / 1000, 0.05);
    last = ts;

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    if      (st === ST.TITLE)                { tickTitle(dt); drawTitle(); }
    else if (st === ST.PLAY || st === ST.DEAD) { tickPlay(dt);  drawPlay();  }
    else if (st === ST.OVER)                 { tickOver(dt);  drawOver();  }

    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
